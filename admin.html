<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Scheduler</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="tool-container">
        <header class="tool-header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></ Asc i> Client Booking</a>
            <h1><i class="fas fa-cog"></i> Admin Dashboard</h1>
            <p>Manage schedule and view bookings</p>
        </header>

        <div class="section-box">
            <button class="nav-back-btn" onclick="adminLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
            
            <div id="admin-message" class="error-msg" style="display:none; background:rgba(34,197,94,0.2);border-color:rgba(34,197,94,0.4);color:#22c55e;"></div>
            
            <h2><i class="fas fa-plus"></i> Add Time Slots</h2>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <div class="form-group" style="flex:1;min-width:160px;">
                    <label>Time Range</label>
                    <input type="text" id="new-slot" placeholder="9:00 - 10:30">
                </div>
                <div class="form-group" style="flex:1;min-width:80px;">
                    <label>Period</label>
                    <select id="period">
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                </div>
                <div style="align-self:end;">
                    <button class="action-btn" onclick="addSlot()">
                        <i class="fas fa-plus"></i> Add Slot
                    </button>
                </div>
            </div>
        </div>

        <div class="section-box">
            <h2><i class="fas fa-list"></i> Current Schedule</h2>
            <ul id="slot-list" style="max-height:400px;overflow:auto;"></ul>
        </div>

        <div style="display:flex;gap:12px;">
            <button class="action-btn btn-primary-full" onclick="saveSchedule()" style="flex:1;">
                <i class="fas fa-save"></i> Save
            </button>
            <button class="action-btn btn-danger" onclick="resetBookings()" style="flex:1;">
                <i class="fas fa-undo"></i> Reset Bookings
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }
        loadAdminSchedule();
    </script>
</body>
</html>
